  <div class="container">
    <h1>무료 색상 팔레트 생성기</h1>
    <p class="site-description">디자이너와 개발자를 위한 간단한 도구입니다. 웹 디자인을 포함한 디지털 프로젝트의 색상을 빠르게 찾고 복사하세요.</p>
    
    <div class="controls">
      <button onclick="renderPalette('pastel')">파스텔</button>
      <button onclick="renderPalette('muted')">뮤트</button>
      <button onclick="renderPalette('red')">레드</button>
      <button onclick="renderPalette('pink')">핑크</button>
      <button onclick="renderPalette('orange')">오렌지</button>
      <button onclick="renderPalette('yellow')">옐로우</button>
      <button onclick="renderPalette('purple')">퍼플</button>
      <button onclick="renderPalette('green')">그린</button>
      <button onclick="renderPalette('blue')">블루</button>
      <button onclick="renderPalette('brown')">브라운</button>
      <button onclick="renderPalette('white')">화이트</button>
      <button onclick="renderPalette('gray')">그레이</button>
    </div>

    <div class="mode-switch">
      <button id="list-mode-btn" class="active" onclick="setViewMode('list')" aria-label="List View">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
      </button>
      <button id="grid-mode-btn" onclick="setViewMode('grid')" aria-label="Grid View">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
      </button>
    </div>

    <div id="palette" class="palette-grid"></div>
